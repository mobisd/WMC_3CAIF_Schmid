{% extends "base.html" %}
{% block title %}Sign up — ReelLog{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md">
    <h1 class="mb-6 font-title text-3xl font-bold">Create your account</h1>
    <form method="post" action="{{ url_for('auth.register') }}" class="card space-y-4 p-6" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div>
        <label class="label" for="username">Username</label>
        <input class="input" id="username" name="username" value="{{ username|default('') }}"
          required minlength="3" maxlength="20" pattern="[a-z0-9_]+"
          autocomplete="username" />
        <p class="mt-1 text-xs text-text-mute">3–20 chars: a–z, 0–9, underscore.</p>
      </div>

      <div>
        <label class="label" for="display_name">Display name <span class="text-text-mute">(optional)</span></label>
        <input class="input" id="display_name" name="display_name" value="{{ display_name|default('') }}" maxlength="80" />
      </div>

      <div>
        <label class="label" for="email">Email</label>
        <input class="input" id="email" name="email" type="email" value="{{ email|default('') }}" required autocomplete="email" />
      </div>

      <div>
        <label class="label" for="password">Password</label>
        <input class="input" id="password" name="password" type="password" required minlength="8" autocomplete="new-password" />
        <p class="mt-1 text-xs text-text-mute">At least 8 characters.</p>
      </div>

      <button type="submit" class="btn-primary w-full">Sign up</button>
    </form>
    <p class="mt-4 text-center text-sm text-text-dim">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="text-accent hover:underline">Log in</a>
    </p>
  </div>
{% endblock %}
